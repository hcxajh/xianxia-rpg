<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙世界 - 练气期</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #fff;
            overflow-x: hidden;
            padding: 0;
            touch-action: none; /* 禁止默认触摸行为 */
        }
        h1 {
            margin: 8px 0;
            text-shadow: 0 0 20px #6644ff;
            font-size: 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            flex-shrink: 0;
        }
        canvas {
            width: 100%;
            height: 100%;
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(100, 100, 200, 0.3);
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 45%;
        }
        #ui div {
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #messageBox {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #6a6a8a;
            text-align: center;
            min-width: 60%;
            max-width: 90%;
            display: none;
            font-size: 14px;
        }
        #messageBox.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        #battleUI {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 40, 0.95);
            padding: 15px;
            border-radius: 10px;
            border: 3px solid #8b0000;
            text-align: center;
            display: none;
            width: 90%;
            max-width: 400px;
        }
        #battleUI.show {
            display: block;
        }
        .battle-title {
            color: #ff4444;
            font-size: 18px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff0000;
        }
        .enemy-info {
            margin: 10px 0;
            padding: 8px;
            background: rgba(100, 0, 0, 0.3);
            border-radius: 5px;
            font-size: 13px;
        }
        .hp-bar {
            width: 100%;
            max-width: 200px;
            height: 16px;
            background: #333;
            border-radius: 10px;
            margin: 5px auto;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.3s ease;
        }
        .hp-fill.player {
            background: linear-gradient(90deg, #44ff44, #66ff66);
        }
        .battle-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 16px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Microsoft YaHei', sans-serif;
            min-width: 70px;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-attack { background: #ff4444; color: white; }
        .btn-attack:hover { background: #ff6666; }
        .btn-skill { background: #8844ff; color: white; }
        .btn-skill:hover { background: #aa66ff; }
        .btn-heal { background: #44aa44; color: white; }
        .btn-heal:hover { background: #66cc66; }
        .btn-run { background: #888; color: white; }
        .btn-run:hover { background: #aaa; }
        
        /* 移动端虚拟摇杆 */
        #joystickArea {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            z-index: 100;
        }
        #joystickBase {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        #joystickKnob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #9966ff, #6644aa);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            left: 35px;
            top: 35px;
            box-shadow: 0 0 15px rgba(150, 100, 255, 0.5);
            transition: transform 0.05s;
        }
        
        /* 移动端操作按钮 */
        #mobileActions {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            gap: 15px;
        }
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            touch-action: manipulation;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .action-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }
        
        #controls {
            margin-top: 10px;
            color: #aaa;
            font-size: 12px;
            text-align: center;
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        /* 响应式断点 - 移动端全屏 */
        @media (max-width: 768px), (pointer: coarse) {
            html, body {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
            }
            h1 {
                font-size: 1rem;
                padding: 5px 0;
                margin: 5px 0;
            }
            #gameContainer {
                width: 100%;
                max-width: 100%;
                aspect-ratio: auto;
                height: calc(100vh - 45px);
                display: flex;
                align-items: center;
                justify-content: center;
            }
            canvas {
                border: none;
                border-radius: 0;
                max-height: 100%;
                max-width: 100%;
            }
            #ui {
                font-size: 9px;
                padding: 4px 6px;
                max-width: 60%;
                top: 5px;
                left: 5px;
            }
            #ui div {
                margin: 1px 0;
            }
            #messageBox {
                font-size: 11px;
                padding: 6px 10px;
                bottom: 5px;
                min-width: 50%;
            }
            .battle-title {
                font-size: 12px;
            }
            .enemy-info {
                font-size: 10px;
                padding: 5px;
            }
            .hp-bar {
                height: 12px;
            }
            button {
                padding: 6px 8px;
                font-size: 10px;
                min-width: 45px;
            }
            /* 显示虚拟摇杆和操作按钮 */
            #joystickArea, #mobileActions {
                display: flex;
            }
            #controls {
                display: none;
            }
            /* 调整战斗UI位置 */
            #battleUI {
                width: 95%;
                max-width: 350px;
                padding: 8px;
            }
            .battle-actions {
                gap: 4px;
                margin-top: 6px;
            }
            .battle-actions button {
                padding: 5px 6px;
                font-size: 9px;
            }
        }
        
        @media (min-width: 769px) {
            /* 平板及以上显示提示 */
            body::after {
                content: '💡 手机端可用屏幕下方按钮控制';
                position: fixed;
                bottom: 10px;
                left: 50%;
                transform: translateX(-50%);
                color: rgba(255,255,255,0.3);
                font-size: 11px;
                display: none;
            }
            @media (hover: none) and (pointer: coarse) {
                body::after {
                    display: block;
                }
            }
        }
        
        /* 隐藏旧的十字键 */
        #mobileControls {
            display: none !important;
        }
    </style>
</head>
<body>
    <h1 style="margin-bottom: 15px; text-shadow: 0 0 20px #6644ff;">🧧 修仙世界 - 练气期</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>💪 境界: <span id="realm">练气期</span></div>
            <div>⭐ 等级: <span id="level">1</span></div>
            <div>❤️ 生命: <span id="hp">100/100</span></div>
            <div>⚡ 灵力: <span id="mp">50/50</span></div>
            <div>🗡️ 攻击力: <span id="atk">10</span></div>
            <div>🛡️ 防御力: <span id="def">5</span></div>
            <div>📍 位置: <span id="pos">山脚</span></div>
        </div>
        <div id="messageBox"></div>
        <div id="battleUI">
            <div class="battle-title">⚔️ 遭遇战斗 ⚔️</div>
            <div class="enemy-info">
                <div id="enemyName">野狼</div>
                <div class="hp-bar"><div id="enemyHP" class="hp-fill" style="width: 100%"></div></div>
                <div>HP: <span id="enemyHpText">50/50</span></div>
            </div>
            <div class="enemy-info">
                <div>你的状态</div>
                <div class="hp-bar"><div id="playerHP" class="hp-fill player" style="width: 100%"></div></div>
                <div>HP: <span id="playerHpText">100/100</span> | MP: <span id="playerMpText">50/50</span></div>
            </div>
            <div class="battle-actions">
                <button class="btn-attack" onclick="battleAction('attack')">🗡️ 攻击</button>
                <button class="btn-skill" onclick="battleAction('skill')">✨ 法术</button>
                <button class="btn-heal" onclick="battleAction('heal')">💚 疗伤</button>
                <button class="btn-run" onclick="battleAction('run')">🏃 逃跑</button>
            </div>
        </div>
    </div>
    <div id="controls">移动: WASD 或 方向键 | 探索: E | 背包: I</div>

    <!-- 移动端虚拟摇杆 -->
    <div id="joystickArea">
        <div id="joystickBase"></div>
        <div id="joystickKnob"></div>
    </div>
    
    <!-- 移动端操作按钮 -->
    <div id="mobileActions">
        <button class="action-btn" onclick="explore()">🔍</button>
        <button class="action-btn" onclick="toggleMenu()">📦</button>
    </div>

    <script>
        // 游戏配置
        const TILE_SIZE = 40;
        const MAP_WIDTH = 20;
        const MAP_HEIGHT = 15;
        
        // 游戏状态
        const game = {
            player: {
                x: 10, y: 7,
                hp: 100, maxHp: 100,
                mp: 50, maxMp: 50,
                atk: 10, def: 5,
                level: 1, exp: 0,
                realm: '练气期',
                name: '修士'
            },
            map: [],
            mapName: '山脚',
            inBattle: false,
            currentEnemy: null,
            logs: []
        };

        // 地图元素
        const TILES = {
            GRASS: 0,
            TREE: 1,
            MOUNTAIN: 2,
            WATER: 3,
            PATH: 4,
            CAVE: 5,
            VILLAGE: 6
        };

        // 敌人数据
        const ENEMIES = [
            { name: '野狼', hp: 30, maxHp: 30, atk: 8, def: 2, exp: 20, level: 1 },
            { name: '毒蛇', hp: 25, maxHp: 25, atk: 10, def: 1, exp: 15, level: 1 },
            { name: '山贼', hp: 40, maxHp: 40, atk: 12, def: 3, exp: 30, level: 2 },
            { name: '野猪', hp: 50, maxHp: 50, atk: 15, def: 5, exp: 40, level: 2 },
            { name: '筑基修士', hp: 80, maxHp: 80, atk: 25, def: 10, exp: 100, level: 5 }
        ];

        // 初始化地图
        function initMap() {
            game.map = [];
            for (let y = 0; y < MAP_HEIGHT; y++) {
                game.map[y] = [];
                for (let x = 0; x < MAP_WIDTH; x++) {
                    // 边缘是山，中间是草地
                    if (x === 0 || x === MAP_WIDTH - 1 || y === 0 || y === MAP_HEIGHT - 1) {
                        game.map[y][x] = TILES.MOUNTAIN;
                    } else if (Math.random() < 0.1) {
                        game.map[y][x] = TILES.TREE;
                    } else if (Math.random() < 0.05) {
                        game.map[y][x] = TILES.PATH;
                    } else {
                        game.map[y][x] = TILES.GRASS;
                    }
                }
            }
            // 玩家出生点设为草地
            game.map[game.player.y][game.player.x] = TILES.GRASS;
        }

        // 绘制地图
        function drawMap() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // 清空画布
            ctx.fillStyle = '#2a2a4a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制地图
            for (let y = 0; y < MAP_HEIGHT; y++) {
                for (let x = 0; x < MAP_WIDTH; x++) {
                    const tile = game.map[y][x];
                    const px = x * TILE_SIZE;
                    const py = y * TILE_SIZE;
                    
                    switch (tile) {
                        case TILES.GRASS:
                            ctx.fillStyle = '#3d5c3d';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            // 草地细节
                            ctx.fillStyle = '#4a7c4a';
                            ctx.fillRect(px + 5, py + 10, 3, 8);
                            ctx.fillRect(px + 20, py + 15, 3, 6);
                            ctx.fillRect(px + 32, py + 8, 3, 7);
                            break;
                        case TILES.TREE:
                            ctx.fillStyle = '#2d4a2d';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            // 树干
                            ctx.fillStyle = '#5c3d2d';
                            ctx.fillRect(px + 15, py + 20, 10, 20);
                            // 树冠
                            ctx.fillStyle = '#1a4a1a';
                            ctx.beginPath();
                            ctx.arc(px + 20, py + 15, 15, 0, Math.PI * 2);
                            ctx.fill();
                            break;
                        case TILES.MOUNTAIN:
                            ctx.fillStyle = '#4a4a5a';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            // 山峰效果
                            ctx.fillStyle = '#5a5a6a';
                            ctx.beginPath();
                            ctx.moveTo(px, py + TILE_SIZE);
                            ctx.lineTo(px + TILE_SIZE / 2, py + 5);
                            ctx.lineTo(px + TILE_SIZE, py + TILE_SIZE);
                            ctx.fill();
                            break;
                        case TILES.PATH:
                            ctx.fillStyle = '#6b5b45';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            break;
                    }
                }
            }

            // 绘制玩家
            const playerPx = game.player.x * TILE_SIZE + TILE_SIZE / 2;
            const playerPy = game.player.y * TILE_SIZE + TILE_SIZE / 2;
            
            // 玩家光环
            const gradient = ctx.createRadialGradient(playerPx, playerPy, 5, playerPx, playerPy, 25);
            gradient.addColorStop(0, 'rgba(150, 100, 255, 0.4)');
            gradient.addColorStop(1, 'rgba(150, 100, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(playerPx, playerPy, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // 玩家角色
            ctx.fillStyle = '#9966ff';
            ctx.beginPath();
            ctx.arc(playerPx, playerPy, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffcc99';
            ctx.beginPath();
            ctx.arc(playerPx, playerPy - 5, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // 玩家方向指示
            ctx.fillStyle = '#fff';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('你', playerPx, playerPy + 4);
        }

        // 更新UI
        function updateUI() {
            document.getElementById('realm').textContent = game.player.realm;
            document.getElementById('level').textContent = game.player.level;
            document.getElementById('hp').textContent = `${game.player.hp}/${game.player.maxHp}`;
            document.getElementById('mp').textContent = `${game.player.mp}/${game.player.maxMp}`;
            document.getElementById('atk').textContent = game.player.atk;
            document.getElementById('def').textContent = game.player.def;
            document.getElementById('pos').textContent = game.mapName;
        }

        // 显示消息
        function showMessage(text, duration = 2000) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.classList.add('show');
            setTimeout(() => msgBox.classList.remove('show'), duration);
        }

        // 移动玩家
        function movePlayer(dx, dy) {
            if (game.inBattle) return;
            
            const newX = game.player.x + dx;
            const newY = game.player.y + dy;
            
            // 检查边界
            if (newX < 0 || newX >= MAP_WIDTH || newY < 0 || newY >= MAP_HEIGHT) {
                return;
            }
            
            // 检查障碍物
            const tile = game.map[newY][newX];
            if (tile === TILES.TREE || tile === TILES.MOUNTAIN) {
                showMessage('此路不通');
                return;
            }
            
            game.player.x = newX;
            game.player.y = newY;
            drawMap();
            
            // 随机遇敌 (15% 概率)
            if (tile === TILES.GRASS && Math.random() < 0.15) {
                startBattle();
            }
        }

        // 战斗系统
        function startBattle() {
            const enemyData = ENEMIES[Math.floor(Math.random() * ENEMIES.length)];
            game.currentEnemy = {
                ...enemyData,
                hp: enemyData.maxHp
            };
            game.inBattle = true;
            
            document.getElementById('battleUI').classList.add('show');
            document.getElementById('enemyName').textContent = game.currentEnemy.name;
            updateBattleUI();
            showMessage(`遭遇 ${game.currentEnemy.name}！`, 1500);
        }

        function updateBattleUI() {
            if (!game.currentEnemy) return;
            
            const enemyHpPercent = (game.currentEnemy.hp / game.currentEnemy.maxHp) * 100;
            document.getElementById('enemyHP').style.width = enemyHpPercent + '%';
            document.getElementById('enemyHpText').textContent = `${game.currentEnemy.hp}/${game.currentEnemy.maxHp}`;
            
            const playerHpPercent = (game.player.hp / game.player.maxHp) * 100;
            document.getElementById('playerHP').style.width = playerHpPercent + '%';
            document.getElementById('playerHpText').textContent = `${game.player.hp}/${game.player.maxHp}`;
            document.getElementById('playerMpText').textContent = `${game.player.mp}/${game.player.maxMp}`;
        }

        function battleAction(action) {
            if (!game.inBattle || !game.currentEnemy) return;
            
            const enemy = game.currentEnemy;
            const player = game.player;
            
            switch (action) {
                case 'attack':
                    // 玩家攻击
                    const playerDmg = Math.max(1, player.atk - enemy.def + Math.floor(Math.random() * 5));
                    enemy.hp -= playerDmg;
                    showMessage(`你对 ${enemy.name} 造成了 ${playerDmg} 点伤害！`);
                    break;
                    
                case 'skill':
                    if (player.mp < 10) {
                        showMessage('灵力不足！');
                        return;
                    }
                    player.mp -= 10;
                    const skillDmg = Math.max(5, player.atk * 2 - enemy.def + Math.floor(Math.random() * 10));
                    enemy.hp -= skillDmg;
                    showMessage(`你施展法术，对 ${enemy.name} 造成了 ${skillDmg} 点伤害！`);
                    break;
                    
                case 'heal':
                    if (player.mp < 15) {
                        showMessage('灵力不足！');
                        return;
                    }
                    player.mp -= 15;
                    const healAmount = Math.min(30, player.maxHp - player.hp);
                    player.hp += healAmount;
                    showMessage(`你运功疗伤恢复了 ${healAmount} 点生命！`);
                    break;
                    
                case 'run':
                    if (Math.random() < 0.5) {
                        showMessage('逃跑成功！');
                        endBattle(false);
                        return;
                    } else {
                        showMessage('逃跑失败！');
                    }
                    break;
            }
            
            updateBattleUI();
            
            // 检查敌人是否死亡
            if (enemy.hp <= 0) {
                const expGain = enemy.exp;
                player.exp += expGain;
                showMessage(`击败 ${enemy.name}！获得 ${expGain} 经验值！`);
                
                // 升级检查
                if (player.exp >= player.level * 50) {
                    player.level++;
                    player.exp = 0;
                    player.maxHp += 20;
                    player.hp = player.maxHp;
                    player.maxMp += 10;
                    player.mp = player.maxMp;
                    player.atk += 3;
                    player.def += 2;
                    showMessage(`升级了！现在是 ${player.level} 级！`);
                }
                
                endBattle(true);
                return;
            }
            
            // 敌人反击
            const enemyDmg = Math.max(1, enemy.atk - player.def + Math.floor(Math.random() * 3));
            player.hp -= enemyDmg;
            updateBattleUI();
            showMessage(`${enemy.name} 对你造成了 ${enemyDmg} 点伤害！`);
            
            // 检查玩家是否死亡
            if (player.hp <= 0) {
                showMessage('你被击败了！正在疗伤...');
                player.hp = Math.floor(player.maxHp / 2);
                player.mp = Math.floor(player.maxMp / 2);
                player.x = 10;
                player.y = 7;
                endBattle(false);
            }
        }

        function endBattle(won) {
            game.inBattle = false;
            game.currentEnemy = null;
            document.getElementById('battleUI').classList.remove('show');
            updateUI();
            drawMap();
        }

        // 探索功能
        function explore() {
            if (!game.inBattle) {
                showMessage('你仔细探查了周围...');
                if (Math.random() < 0.3) {
                    game.player.mp = Math.min(game.player.maxMp, game.player.mp + 10);
                    showMessage('发现了一些灵草！灵力恢复了10点！');
                }
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'w':
                case 'W':
                case 'ArrowUp':
                    movePlayer(0, -1);
                    break;
                case 's':
                case 'S':
                case 'ArrowDown':
                    movePlayer(0, 1);
                    break;
                case 'a':
                case 'A':
                case 'ArrowLeft':
                    movePlayer(-1, 0);
                    break;
                case 'd':
                case 'D':
                case 'ArrowRight':
                    movePlayer(1, 0);
                    break;
                case 'e':
                case 'E':
                    explore();
                    break;
            }
            updateUI();
        });

        // 触摸滑动控制 - 增强版：支持连续滑动
        let touchStartX = 0;
        let touchStartY = 0;
        let isSwiping = false;
        let swipeInterval = null;
        const MIN_SWIPE = 30;
        const SWIPE_DELAY = 200; // 连续滑动间隔（毫秒）

        // 监听 canvas 上的触摸事件
        const canvas = document.getElementById('gameCanvas');
        
        // 执行滑动移动
        function doSwipeMove(dx, dy) {
            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                movePlayer(dx > 0 ? 1 : -1, 0);
            } else {
                // 垂直滑动 - 手指向下滑 = 向下走
                movePlayer(0, dy > 0 ? 1 : -1);
            }
        }
        
        // 开始连续滑动
        function startContinuousSwipe(dx, dy) {
            if (swipeInterval) clearInterval(swipeInterval);
            doSwipeMove(dx, dy);
            swipeInterval = setInterval(() => {
                if (!game.inBattle && isSwiping) {
                    doSwipeMove(dx, dy);
                }
            }, SWIPE_DELAY);
        }
        
        // 停止连续滑动
        function stopContinuousSwipe() {
            if (swipeInterval) {
                clearInterval(swipeInterval);
                swipeInterval = null;
            }
        }
        
        canvas.addEventListener('touchstart', (e) => {
            if (game.inBattle) return;
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            isSwiping = true;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (game.inBattle || !isSwiping) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            
            // 达到滑动阈值后开始连续移动
            if (Math.abs(dx) > MIN_SWIPE || Math.abs(dy) > MIN_SWIPE) {
                // 判断方向
                const moveDx = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 1 : -1) : 0;
                const moveDy = Math.abs(dy) >= Math.abs(dx) ? (dy > 0 ? 1 : -1) : 0;
                
                // 根据当前触摸位置动态调整方向
                if (moveDx !== 0 && !swipeInterval) {
                    startContinuousSwipe(moveDx, 0);
                } else if (moveDy !== 0 && !swipeInterval) {
                    startContinuousSwipe(0, moveDy);
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (game.inBattle) return;
            e.preventDefault();
            
            stopContinuousSwipe();
            isSwiping = false;
            
            // 如果是快速点击（不足滑动阈值），执行一次移动
            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            
            if (Math.abs(dx) < MIN_SWIPE && Math.abs(dy) < MIN_SWIPE) {
                // 点击区域：上半屏向上，下半屏向下，左半屏向左，右半屏向右
                const rect = canvas.getBoundingClientRect();
                const relX = touch.clientX - rect.left;
                const relY = touch.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                if (relY < centerY - 30) {
                    movePlayer(0, -1); // 上
                } else if (relY > centerY + 30) {
                    movePlayer(0, 1);  // 下
                } else if (relX < centerX - 30) {
                    movePlayer(-1, 0); // 左
                } else if (relX > centerX + 30) {
                    movePlayer(1, 0);  // 右
                }
            }
        }, { passive: false });

        // 触摸取消处理
        canvas.addEventListener('touchcancel', () => {
            isSwiping = false;
            stopContinuousSwipe();
        });

        // ==================== 虚拟摇杆控制 ====================
        const joystickArea = document.getElementById('joystickArea');
        const joystickKnob = document.getElementById('joystickKnob');
        let joystickActive = false;
        let joystickTimer = null;
        let joystickDx = 0;
        let joystickDy = 0;
        
        const JOYSTICK_RADIUS = 60; // 底座半径
        const KNOB_RADIUS = 25; // 摇杆半径
        const MAX_DISTANCE = JOYSTICK_RADIUS - KNOB_RADIUS; // 最大移动距离
        
        // 触摸开始
        joystickArea.addEventListener('touchstart', (e) => {
            if (game.inBattle) return;
            e.preventDefault();
            e.stopPropagation();
            joystickActive = true;
            handleJoystickMove(e.touches[0]);
            startJoystickMove();
        }, { passive: false });
        
        // 触摸移动
        joystickArea.addEventListener('touchmove', (e) => {
            if (game.inBattle || !joystickActive) return;
            e.preventDefault();
            e.stopPropagation();
            handleJoystickMove(e.touches[0]);
        }, { passive: false });
        
        // 触摸结束
        joystickArea.addEventListener('touchend', (e) => {
            if (game.inBattle) return;
            e.preventDefault();
            e.stopPropagation();
            resetJoystick();
        }, { passive: false });
        
        // 处理摇杆移动
        function handleJoystickMove(touch) {
            const rect = joystickArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            
            // 计算距离并限制范围
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > MAX_DISTANCE) {
                dx = (dx / distance) * MAX_DISTANCE;
                dy = (dy / distance) * MAX_DISTANCE;
            }
            
            // 更新摇杆位置
            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            
            // 计算方向向量
            joystickDx = dx / MAX_DISTANCE;
            joystickDy = dy / MAX_DISTANCE;
        }
        
        // 重置摇杆
        function resetJoystick() {
            joystickActive = false;
            joystickDx = 0;
            joystickDy = 0;
            joystickKnob.style.transform = 'translate(0, 0)';
            stopJoystickMove();
        }
        
        // 开始连续移动
        function startJoystickMove() {
            if (joystickTimer) return;
            joystickTimer = setInterval(() => {
                if (!joystickActive || game.inBattle) return;
                
                // 根据摇杆方向移动
                const moveSpeed = 0.3; // 移动速度阈值
                if (Math.abs(joystickDx) > moveSpeed || Math.abs(joystickDy) > moveSpeed) {
                    const dx = joystickDx > moveSpeed ? 1 : (joystickDx < -moveSpeed ? -1 : 0);
                    const dy = joystickDy > moveSpeed ? 1 : (joystickDy < -moveSpeed ? -1 : 0);
                    movePlayer(dx, dy);
                }
            }, 150); // 移动间隔
        }
        
        // 停止连续移动
        function stopJoystickMove() {
            if (joystickTimer) {
                clearInterval(joystickTimer);
                joystickTimer = null;
            }
        }
        
        // 菜单功能（移动端）
        function toggleMenu() {
            showMessage('背包功能开发中...');
        }

        // 初始化游戏
        function init() {
            initMap();
            drawMap();
            updateUI();
            showMessage('欢迎来到修仙世界！使用 WASD 移动，探索四方！');
        }

        init();
    </script>
</body>
</html>
